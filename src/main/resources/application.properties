spring.application.name=StudyRooms
server.port=8080

spring.datasource.url=jdbc:h2:mem:studyrooms;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

springdoc.swagger-ui.path=/swagger-ui.html

app.jwt.secret=change-this-secret-change-this-secret-change-this-secret
app.jwt.issuer=studyrooms
app.jwt.expiration-minutes=120
app.rules.max-active-reservations-per-student-per-day=2
app.holidays.base-url=https://date.nager.at/api/v3
app.holidays.country-code=GR
